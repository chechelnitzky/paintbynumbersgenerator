<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paint by Numbers - DAYU Generator</title>
  
  <!-- Estilos del UI moderno -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
    }
    
    /* Header */
    .pbn-header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .pbn-logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .pbn-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #EC4899, #F472B6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .pbn-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }
    
    .pbn-subtitle {
      font-size: 14px;
      color: #a0a0a0;
      margin: 0;
    }
    
    /* Layout principal */
    .pbn-main {
      display: flex;
      height: calc(100vh - 73px);
    }
    
    /* Sidebar */
    .pbn-sidebar {
      width: 450px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
    }
    
    .pbn-sidebar::-webkit-scrollbar {
      width: 8px;
    }
    
    .pbn-sidebar::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    
    .pbn-sidebar::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 4px;
    }
    
    /* Upload area */
    .pbn-upload-area {
      background: #0f0f0f;
      border: 2px dashed #2a2a2a;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 24px;
    }
    
    .pbn-upload-area:hover {
      border-color: #EC4899;
      background: rgba(236, 72, 153, 0.05);
    }
    
    .pbn-upload-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .pbn-upload-text {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .pbn-upload-hint {
      font-size: 14px;
      color: #a0a0a0;
    }
    
    /* Control groups */
    .pbn-control-group {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .pbn-control-header {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #EC4899;
      margin-bottom: 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    
    .pbn-control {
      margin-bottom: 16px;
    }
    
    .pbn-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    
    .pbn-value {
      color: #EC4899;
      font-weight: 700;
    }
    
    /* Sliders */
    .pbn-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, #EC4899, #F472B6);
      outline: none;
      cursor: pointer;
    }
    
    .pbn-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      border: 2px solid #EC4899;
    }
    
    .pbn-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      border: 2px solid #EC4899;
    }
    
    /* Inputs */
    .pbn-input-row {
      display: flex;
      gap: 12px;
    }
    
    .pbn-input-group {
      flex: 1;
    }
    
    .pbn-input-label {
      display: block;
      font-size: 13px;
      color: #a0a0a0;
      margin-bottom: 6px;
      font-weight: 500;
    }
    
    .pbn-input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      color: white;
      font-size: 14px;
    }
    
    .pbn-input:hover {
      border-color: #EC4899;
    }
    
    .pbn-input:focus {
      outline: none;
      border-color: #EC4899;
      box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
    }
    
    /* Botón generar */
    .pbn-generate-btn {
      width: 100%;
      background: linear-gradient(135deg, #EC4899, #F472B6);
      border: none;
      border-radius: 12px;
      padding: 16px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      filter: drop-shadow(0 4px 8px rgba(236, 72, 153, 0.5));
      margin-top: 16px;
    }
    
    .pbn-generate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: drop-shadow(0 8px 16px rgba(236, 72, 153, 0.5));
    }
    
    .pbn-generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Preview area */
    .pbn-preview {
      flex: 1;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .pbn-preview-header {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a2a;
    }
    
    .pbn-preview-title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .pbn-preview-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,.03) 10px, rgba(255,255,255,.03) 20px);
      overflow: auto;
    }
    
    .pbn-preview-empty {
      text-align: center;
      color: #666;
    }
    
    .pbn-empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    
    .pbn-empty-text {
      font-size: 18px;
      font-weight: 600;
      color: #a0a0a0;
      margin-bottom: 8px;
    }
    
    .pbn-empty-hint {
      font-size: 14px;
      color: #666;
    }
    
    .pbn-preview-image,
    .pbn-preview-svg {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(236, 72, 153, 0.3);
    }
    
    #svgContainer {
      width: 100%;
      height: auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    #svgContainer svg {
      width: 100%;
      height: auto;
      max-width: 100%;
    }
    
    /* Progress */
    .pbn-progress {
      margin-top: 16px;
      display: none;
    }
    
    .pbn-progress.active {
      display: block;
    }
    
    .pbn-progress-label {
      font-size: 12px;
      color: #a0a0a0;
      margin-bottom: 6px;
    }
    
    .pbn-progress-bar {
      width: 100%;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      overflow: hidden;
    }
    
    .pbn-progress-fill {
      height: 100%;
      background: linear-gradient(to right, #EC4899, #F472B6);
      width: 0%;
      transition: width 0.3s;
    }
    
    /* Paleta de colores */
    #palette {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 12px;
      margin-top: 24px;
      padding: 16px;
      background: #1a1a1a;
      border-radius: 12px;
    }
    
    #palette > div {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    #palette > div:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 4px 16px rgba(236, 72, 153, 0.3);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .pbn-main {
        flex-direction: column;
      }
      
      .pbn-sidebar {
        width: 100%;
        max-height: 50vh;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="pbn-header">
    <div class="pbn-logo">
      <div class="pbn-logo-icon">🎨</div>
      <div>
        <h1 class="pbn-title">Paint by Numbers - DAYU</h1>
        <p class="pbn-subtitle">Generador de plantillas</p>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="pbn-main">
    <!-- Sidebar -->
    <aside class="pbn-sidebar">
      <!-- Upload -->
      <div class="pbn-upload-area" onclick="document.getElementById('imageInput').click()">
        <div class="pbn-upload-icon">📤</div>
        <p class="pbn-upload-text">Sube una imagen</p>
        <p class="pbn-upload-hint">Click aquí o arrastra una imagen</p>
      </div>
      <input type="file" id="imageInput" accept="image/*" style="display: none;">
      
      <!-- CONFIGURACIÓN DAYU -->
      <div class="pbn-control-group">
        <div class="pbn-control-header">
          🎨 COLORES
        </div>
        
        <div class="pbn-control">
          <div class="pbn-label">
            <span>Número de colores</span>
            <span class="pbn-value" id="numColorsValue">24</span>
          </div>
          <input type="range" class="pbn-slider" id="numColors" min="2" max="64" value="24">
        </div>
      </div>

      <div class="pbn-control-group">
        <div class="pbn-control-header">
          📐 TAMAÑO SVG
        </div>
        
        <div class="pbn-input-row">
          <div class="pbn-input-group">
            <label class="pbn-input-label">Multiplicador</label>
            <input type="number" class="pbn-input" id="sizeMultiplier" value="3" min="1" max="10">
          </div>
          
          <div class="pbn-input-group">
            <label class="pbn-input-label">Tamaño fuente</label>
            <input type="number" class="pbn-input" id="fontSize" value="50" min="10" max="100">
          </div>
        </div>
      </div>

      <div class="pbn-control-group">
        <div class="pbn-control-header">
          🔲 FACETAS
        </div>
        
        <div class="pbn-control">
          <div class="pbn-label">
            <span>Tamaño mínimo (px)</span>
            <span class="pbn-value" id="minFacetValue">20</span>
          </div>
          <input type="range" class="pbn-slider" id="minFacet" min="5" max="100" value="20">
        </div>
      </div>
      
      <!-- Botón generar -->
      <button class="pbn-generate-btn" id="generateBtn" disabled>
        🎨 Generar Paint by Numbers
      </button>
      
      <!-- Progress -->
      <div class="pbn-progress" id="progressContainer">
        <div class="pbn-progress-label" id="progressLabel">Procesando...</div>
        <div class="pbn-progress-bar">
          <div class="pbn-progress-fill" id="progressFill"></div>
        </div>
      </div>
      
      <!-- Paleta de colores -->
      <div id="palette"></div>
    </aside>

    <!-- Preview Area -->
    <main class="pbn-preview">
      <div class="pbn-preview-header">
        <h2 class="pbn-preview-title">Vista previa</h2>
      </div>
      
      <div class="pbn-preview-content" id="previewContent">
        <div class="pbn-preview-empty">
          <div class="pbn-empty-icon">📷</div>
          <p class="pbn-empty-text">Sin imagen</p>
          <p class="pbn-empty-hint">Sube una imagen para comenzar</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts DAYU originales -->
  <script src="dayu_palette.js"></script>
  <script src="dayu_simple.js"></script>

  <script>
    // Variables globales
    let currentImage = null;
    let currentImageElement = null;

    // Upload de imagen
    document.getElementById('imageInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          currentImage = event.target.result;
          
          // Crear elemento de imagen
          const img = new Image();
          img.onload = function() {
            currentImageElement = img;
            
            // Mostrar preview
            document.getElementById('previewContent').innerHTML = 
              '<img src="' + currentImage + '" class="pbn-preview-image" alt="Preview">';
            
            // Habilitar botón
            document.getElementById('generateBtn').disabled = false;
          };
          img.src = currentImage;
        };
        reader.readAsDataURL(file);
      }
    });

    // Drag and drop
    const uploadArea = document.querySelector('.pbn-upload-area');
    
    uploadArea.addEventListener('dragover', function(e) {
      e.preventDefault();
      this.style.borderColor = '#EC4899';
    });
    
    uploadArea.addEventListener('dragleave', function(e) {
      this.style.borderColor = '#2a2a2a';
    });
    
    uploadArea.addEventListener('drop', function(e) {
      e.preventDefault();
      this.style.borderColor = '#2a2a2a';
      
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const input = document.getElementById('imageInput');
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        input.files = dataTransfer.files;
        input.dispatchEvent(new Event('change'));
      }
    });

    // Actualizar valores de sliders
    document.getElementById('numColors').addEventListener('input', function(e) {
      document.getElementById('numColorsValue').textContent = e.target.value;
    });

    document.getElementById('minFacet').addEventListener('input', function(e) {
      document.getElementById('minFacetValue').textContent = e.target.value;
    });

    // Botón generar - CONECTA CON DAYU
    document.getElementById('generateBtn').addEventListener('click', async function() {
      if (!currentImageElement) return;
      
      try {
        // Deshabilitar botón
        this.disabled = true;
        
        // Mostrar progress
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressLabel = document.getElementById('progressLabel');
        progressContainer.classList.add('active');
        
        // Obtener valores
        const numColors = parseInt(document.getElementById('numColors').value);
        const sizeMultiplier = parseInt(document.getElementById('sizeMultiplier').value);
        const fontSize = parseInt(document.getElementById('fontSize').value);
        const minFacetSize = parseInt(document.getElementById('minFacet').value);
        
        // Actualizar progress
        progressLabel.textContent = 'Procesando con DAYU...';
        progressFill.style.width = '30%';
        
        // ⭐ LLAMAR A LA FUNCIÓN DAYU ⭐
        // Asumiendo que existe una función global de DAYU
        if (typeof processImageWithDAYU !== 'undefined') {
          const result = await processImageWithDAYU(currentImageElement, {
            numColors: numColors,
            sizeMultiplier: sizeMultiplier,
            fontSize: fontSize,
            minFacetSize: minFacetSize
          });
          
          progressFill.style.width = '100%';
          progressLabel.textContent = '¡Completado!';
          
          // Mostrar resultado
          if (result.svg) {
            document.getElementById('previewContent').innerHTML = 
              '<div id="svgContainer">' + result.svg + '</div>';
          }
          
          // Mostrar paleta
          if (result.palette) {
            displayPalette(result.palette);
          }
        } else {
          // Si no existe la función, mostrar error
          alert('Error: No se encontró la función de procesamiento DAYU. Verifica que dayu_simple.js esté cargado correctamente.');
        }
        
      } catch (error) {
        console.error('Error al procesar:', error);
        alert('Error al procesar la imagen: ' + error.message);
      } finally {
        // Re-habilitar botón
        setTimeout(() => {
          this.disabled = false;
          document.getElementById('progressContainer').classList.remove('active');
        }, 1000);
      }
    });

    // Función para mostrar paleta
    function displayPalette(colors) {
      const paletteDiv = document.getElementById('palette');
      paletteDiv.innerHTML = '';
      
      colors.forEach((color, index) => {
        const colorDiv = document.createElement('div');
        colorDiv.style.backgroundColor = color.hex || `rgb(${color.r},${color.g},${color.b})`;
        colorDiv.style.color = getContrastColor(color);
        colorDiv.textContent = index + 1;
        colorDiv.title = color.hex || `RGB(${color.r},${color.g},${color.b})`;
        paletteDiv.appendChild(colorDiv);
      });
    }

    // Función para calcular color de contraste
    function getContrastColor(color) {
      const r = color.r || 0;
      const g = color.g || 0;
      const b = color.b || 0;
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.5 ? '#000000' : '#ffffff';
    }
  </script>
</body>
</html>
